<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivinatur — Cosmética Natural</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bark:#2d1f14; --bark2:#4a3728;
  --moss:#3d5a3e; --moss2:#5a7d5b; --moss-lite:#eef4ee;
  --sand:#f5efe6; --sand2:#ede3d5; --sand3:#d4c4b0;
  --clay:#c4856a; --clay2:#e8a882;
  --cream:#faf6f0; --white:#fff;
  --text:#2d2418; --sub:#7a6a58; --muted:#a8998a;
  --gold:#b08038; --gold-lite:#fdf5e6;
  --red:#b5422a; --red-lite:#fdf0ed;
  --green:#3a6b3b; --green-lite:#eef5ee;
  --border:rgba(196,133,106,0.22);
  --sh:0 4px 28px rgba(45,31,20,.08);
  --sh2:0 12px 50px rgba(45,31,20,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text)}
img{max-width:100%;display:block}
.view{display:none} .view.active{display:block}
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:var(--sand3);border-radius:3px}

/* HEADER */
.pub-header{background:var(--bark);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.2)}
.pub-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.8rem}
.hlogo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--cream);letter-spacing:.2em;font-weight:300;line-height:1}
.hlogo-sub{font-size:.57rem;letter-spacing:.3em;text-transform:uppercase;color:var(--clay2);margin-top:.1rem}
.hactions{display:flex;align-items:center;gap:.7rem}
.hbtn{padding:.44rem 1rem;border-radius:20px;font-family:'Nunito',sans-serif;font-size:.74rem;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;font-weight:500;position:relative}
.hbtn.ghost{background:transparent;border:1px solid rgba(232,168,130,.35);color:var(--clay2)}
.hbtn.admin{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.cart-badge{position:absolute;top:-8px;right:-8px;background:var(--red);color:#fff;font-size:.6rem;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}

/* HERO */
.hero{background:linear-gradient(168deg,var(--bark) 0%,#3d2318 50%,#6b4030 100%);padding:5rem 1.8rem 4.5rem;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:50px;background:var(--cream);clip-path:ellipse(58% 100% at 50% 100%)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,6vw,4.8rem);color:var(--cream);font-weight:300;line-height:1.1;margin-bottom:1.5rem}
.hero-title em{color:var(--clay2);font-style:italic}

/* CATALOG */
.cat-section{max-width:1200px;margin:0 auto;padding:3rem 1.8rem 5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.8rem}
.card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:transform .3s;border:1px solid var(--border);position:relative}
.card:hover{transform:translateY(-5px)}
.card-img{width:100%;height:220px;object-fit:cover}
.card-body{padding:1.3rem}
.card-price{font-weight:700;color:var(--gold);font-size:1.1rem;margin-top:.5rem}
.card-cta{width:100%;margin-top:1rem;padding:.6rem;border-radius:8px;border:none;background:var(--bark);color:var(--cream);cursor:pointer;font-weight:600}

/* ADMIN SHELL */
#view-admin{display:none;background:#f8f5f0;min-height:100vh}
.admin-container{display:flex}
.sidebar{width:250px;background:var(--bark);color:#fff;min-height:100vh;padding:1.5rem;position:fixed}
.main-admin{margin-left:250px;padding:2rem;width:100%}
.admin-nav-btn{display:block;width:100%;padding:.8rem;background:none;border:none;color:rgba(255,255,255,0.6);text-align:left;cursor:pointer;font-size:.9rem;border-radius:8px;margin-bottom:.5rem}
.admin-nav-btn.active{background:var(--clay);color:#fff}

/* TABLES & FORMS */
.admin-card{background:#fff;padding:1.5rem;border-radius:12px;box-shadow:var(--sh);margin-bottom:2rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-size:.8rem;font-weight:700;margin-bottom:.4rem;color:var(--bark)}
.form-group input, .form-group textarea, .form-group select{width:100%;padding:.7rem;border:1px solid var(--sand3);border-radius:8px}
.cost-table{width:100%;border-collapse:collapse}
.cost-table th{text-align:left;padding:.8rem;background:var(--sand)}
.cost-table td{padding:.8rem;border-bottom:1px solid var(--sand2)}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.on{display:flex}
.modal{background:var(--cream);padding:2rem;border-radius:20px;max-width:500px;width:90%}

/* UTILS */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--moss);color:#fff;padding:1rem;border-radius:8px;z-index:2000;display:none}
</style>
</head>
<body>

</body>
</html>
